<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashCards</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="p-2 pt-0 bg-slate-50">
    <script src="script.js"></script>
    <!-- FlashCards Content -->
     
    <header class="py-3 p-8 flex gap-2 items-center justify-between">
        <!-- Left FlashCard -->
        <div class="Left_flashCard flex gap-2 items-center  ">
            <!-- Svg -->
            <div class="Cards_svg">
               <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M130-189 81-546q-5-32 15.5-58t52.5-31l61 435 283-40h267q-8 21-24.5 35.5T695-187l-477 66q-33 5-58-15t-30-53Zm190-127q-33 0-56.5-23.5T240-396v-364q0-33 23.5-56.5T320-840h480q33 0 56.5 23.5T880-760v364q0 33-23.5 56.5T800-316H320Zm0-80h480v-364H320v364Zm0 0v-364 364ZM210-200Zm190-400h320v-80H400v80Zm0 120h200v-80H400v80Z"/></svg>
            </div>
            <h1 class="FlashCard_title font-bold text-2xl text-brown-500  ">
                FlashCard
            </h1>
        </div>
        <!-- Right FlashCard -->
        <div class="Right_flashCard px-8 py-3 flex gap-4 items-center bg-slate-100 rounded-full shadow-md pt-1 pb-1 pl-1">
            <div class="FlashCard_content px-4 py-2 bg-yellow-300 rounded-full shadow-md cursor-pointer">
                <!-- Content for the right flashcard -->
                    <span class="font-bold text-brown-400">Study Mode</span>
                </div>
            <div class="FlashCard_content cursor-pointer">
                <!-- Content for the right flashcard -->
                 <span class="font-bold text-brown-400">All Cards</span>
            </div>
        </div>
    </header>
    <!-- Main container -->
     <div class="main_container w-full  gap-4 h-screen p-9 rounded-lg  flex flex-col sm:flex-col md:flex-col lg:flex-row xl:flex-row 2xl:flex-row">
        <!-- Left column -->  
        <div class="left_column shadow-lg h-screen w-full rounded-lg border p-5 pt-0 pl-0 pr-0 flex flex-col gap-4 ">
            <div class="head-top-container py-3 px-4 flex items-center justify-between border">
                <div class="left-side flex items-center gap-2">
                       <h2 class="text-md font-bold text-brown-500 border p-2 rounded-full cursor-pointer">My FlashCards</h2>
                        <input type="checkbox" id="vehicle2" name="vehicle2" value="Car" class="border border-brown-400 ">
                        <h2 class="text-md font-bold text-brown-500">Hide Mastered Cards</h2>

                </div>
             
                <button class="px-4 py-2 bg-pink-500 text-white cursor-pointer rounded-full border font-bold shadow-md hover:bg-pink-600 transition duration-300">
                    Add New Card
                </button>
            </div>
            <div class="screeen-container p-5 h-2/3 w-full justify-center items-center flex">
                <div class="w-full h-full  p-5 bg-pink-300 mt-4 rounded-lg justify-center   items-center flex flex-col gap-4">
                    <h1 class="text-[20px] sm:text-[20px] md:text-[30px] lg:text-[40px] font-bold text-brown-500">What does HTML standard for?</h1>
                    <span class="text-brown-500 font-bold cursor-pointer">Click to reveal answer</span>
                </div>
            </div>
            <div class="button-container flex justify-center gap-4">
                <!-- Button 1 -->
                 <div class="first">
                    <button class="px-4 py-2 bg-yellow-500  text-white cursor-pointer flex gap-4 rounded-full border font-bold shadow-md hover:bg-pink-200 transition duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="m424-296 282-282-56-56-226 226-114-114-56 56 170 170Zm56 216q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/></svg>
                       i Know This
            </button>
                 </div>
                <!-- Button 2 -->
                 <div class="second">
                    <button class="px-4 py-2   cursor-pointer flex gap-2 rounded-full border font-bold shadow-md hover:bg-pink-200 transition duration-300">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M480-400q-33 0-56.5-23.5T400-480q0-33 23.5-56.5T480-560q33 0 56.5 23.5T560-480q0 33-23.5 56.5T480-400Zm0 280q-139 0-241-91.5T122-440h82q14 104 92.5 172T480-200q117 0 198.5-81.5T760-480q0-117-81.5-198.5T480-760q-69 0-129 32t-101 88h110v80H120v-240h80v94q51-64 124.5-99T480-840q75 0 140.5 28.5t114 77q48.5 48.5 77 114T840-480q0 75-28.5 140.5t-77 114q-48.5 48.5-114 77T480-120Z"/></svg>
                        Reset Progress
            </button>
                 </div>
            </div>
            <!-- Final bottom left side -->
           <div class="final-bottom-container mb-0 flex items-center justify-between border-t p-4">
            <div class="justify-center flex items-center">
                <!-- Button 1-->
                <button class=" py-2 px-4 bg-yellow-500 text-white cursor-pointer rounded-full border font-bold shadow-md hover:bg-pink-200 transition duration-300">
                    < Previous
                </button>
            </div>
            <!-- Page Number -->
            <div class="text-brown-500 font-bold">Card 1 of 40</div>
            <div class="">
                <!-- Button 2 -->
                <button class=" py-2 px-4 bg-yellow-500 text-white cursor-pointer rounded-full border font-bold shadow-md hover:bg-pink-200 transition duration-300">
                    Next >
                </button>
            </div>
           </div>
        </div>
        <!-- Right column -->
        <div class="right_column h-screen rounded-lg shadow-lg border p-2  w-full lg:w-auto">
            <!-- Grid 1 column  -->
             <h2 class="text-xl font-bold text-brown-500">Study Statistics</h2>
                <div class="grid grid-cols-1 gap-4 mt-4">
                    <!-- Card 1 -->
                    <div class="card bg-slate-100 rounded-lg shadow-md p-4 flex  pt-0 pb-0 right-0 justify-between box-border sm:w-full md:w-full lg:w-auto xl:w-auto 2xl:w-auto">
                        <div class="p-4">
                        <h3 class="text-lg font-bold text-brown-400">Total Cards</h3>
                        <p class="text-2xl font-bold text-brown-500">150</p>
                        </div>
                     <!-- Right icon -->
                        <div class="right-icon-bg h-full w-20 pr-2 bg-pink-500 items-center flex justify-center rounded-r-lg border">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M160-440v80h640v-80H160Zm0-440h640q33 0 56.5 23.5T880-800v440q0 33-23.5 56.5T800-280H640v200l-160-80-160 80v-200H160q-33 0-56.5-23.5T80-360v-440q0-33 23.5-56.5T160-880Zm0 320h640v-240H160v240Zm0 200v-440 440Z"/></svg>
                        </div>
                    </div>
                    <!-- Card 2 -->
                    <div class="card bg-slate-100 rounded-lg shadow-md p-4 flex justify-between pt-0 pb-0 right-0 box-border ">
                        <div class="p-4">
                            <h3 class="text-lg font-bold text-brown-400">Mastered</h3>
                        <p class="text-2xl font-bold text-brown-500">75</p>
                        </div>
                         <!-- Right icon -->
                        <div class="right-icon-bg h-full w-20 pr-2 bg-yellow-500 items-center flex justify-center rounded-r-lg border ">
                          <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M390-120q-51 0-88-35.5T260-241q-60-8-100-53t-40-106q0-21 5.5-41.5T142-480q-11-18-16.5-38t-5.5-42q0-61 40-105.5t99-52.5q3-51 41-86.5t90-35.5q26 0 48.5 10t41.5 27q18-17 41-27t49-10q52 0 89.5 35t40.5 86q59 8 99.5 53T840-560q0 22-5.5 42T818-480q11 18 16.5 38.5T840-400q0 62-40.5 106.5T699-241q-5 50-41.5 85.5T570-120q-25 0-48.5-9.5T480-156q-19 17-42 26.5t-48 9.5Zm130-590v460q0 21 14.5 35.5T570-200q20 0 34.5-16t15.5-36q-21-8-38.5-21.5T550-306q-10-14-7.5-30t16.5-26q14-10 30-7.5t26 16.5q11 16 28 24.5t37 8.5q33 0 56.5-23.5T760-400q0-5-.5-10t-2.5-10q-17 10-36.5 15t-40.5 5q-17 0-28.5-11.5T640-440q0-17 11.5-28.5T680-480q33 0 56.5-23.5T760-560q0-33-23.5-56T680-640q-11 18-28.5 31.5T613-587q-16 6-31-1t-20-23q-5-16 1.5-31t22.5-20q15-5 24.5-18t9.5-30q0-21-14.5-35.5T570-760q-21 0-35.5 14.5T520-710Zm-80 460v-460q0-21-14.5-35.5T390-760q-21 0-35.5 14.5T340-710q0 16 9 29.5t24 18.5q16 5 23 20t2 31q-6 16-21 23t-31 1q-21-8-38.5-21.5T279-640q-32 1-55.5 24.5T200-560q0 33 23.5 56.5T280-480q17 0 28.5 11.5T320-440q0 17-11.5 28.5T280-400q-21 0-40.5-5T203-420q-2 5-2.5 10t-.5 10q0 33 23.5 56.5T280-320q20 0 37-8.5t28-24.5q10-14 26-16.5t30 7.5q14 10 16.5 26t-7.5 30q-14 19-32 33t-39 22q1 20 16 35.5t35 15.5q21 0 35.5-14.5T440-250Zm40-230Z"/></svg>
                        </div>
                    </div>
                    <!-- Card 3 -->
                    <div class="card bg-slate-100 rounded-lg shadow-md p-4 flex justify-between pt-0 pb-0 right-0 box-border">
                        <div class="p-4">
                            <h3 class="text-lg font-bold text-brown-400">Study Time</h3>
                            <p class="text-2xl font-bold text-brown-500">5 hrs</p>
                        </div>
                        <!-- Right icon -->
                        <div class="right-icon-bg h-full w-20 pr-2 bg-blue-500 items-center flex justify-center rounded-r-lg border">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M160-440v80h640v-80H160Zm0-440h640q33 0 56.5 23.5T880-800v440q0 33-23.5 56.5T800-280H640v200l-160-80-160 80v-200H160q-33 0-56.5-23.5T8₀-36₀v-44₀q₀-3₃ ₂₃.₅-56.5T16₀-88₀Zm₀ 32₀h64₀v-24₀H16₀v24₀Zm₀ 2₀₀v-44₀ 44₀Z"/></svg>
                        </div>
                    </div>
                    <!-- Card 4 -->
                    <div class="card bg-slate-100 rounded-lg shadow-md p-4 flex justify-between pt-0 pb-0 right-0 box-border">
                        <div class="p-4">
                            <h3 class="text-lg font-bold text-brown-400">Days Streak</h3>
                            <p class="text-2xl font-bold text-brown-500">7</p>
                        </div>
                        <!-- Right icon -->
                        <div class="right-icon-bg h-full w-20 pr-2 bg-green-500 items-center flex justify-center rounded-r-lg border">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M160-440v80h640v-80H160Zm0-440h640q33 0 56.5 23.5T880-800v440q0 33-23.5 56.5T800-280H640v200l-160-8₀-16₀ 8₀v-2₀₀H16₀q-33 ₀-56.5-23.5T8₀-36₀v-44₀q₀-3₃ ₂₃.₅-56.5T16₀-88₀Zm₀ 32₀h64₀v-24₀H16₀v24₀Zm₀ 2₀₀v-44₀ 44₀Z"/></svg>
                        </div>
                    </div>

        </div>
     </div>
     
</body>
</html>
