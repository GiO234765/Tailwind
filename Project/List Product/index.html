<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SM SHOP</title>
    <link rel="stylesheet" href="../../dist/tailwind.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="bg-gray-100 p-2">
    <!-- Header Container -->
    <header
      class="header-container p-6 rounded-md bg-white flex justify-between"
    >
      <div class="left-side flex gap-5">
        <img
          src="pexels-daniel-lazarov-1357330-2649167.jpg"
          alt=""
          class="profile-image w-10 h-10 rounded-full"
        />
        <button>Home</button>
        <button>News</button>
        <button>Brand</button>
        <button>Contact</button>
      </div>

      <div class="right-side-search-bar">
        <input
          type="text"
          placeholder="Search..."
          class="px-4 py-2 rounded-md border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
        <button
          class="px-4 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600"
        >
          Search
        </button>
      </div>
    </header>

    <!-- Main Container -->
    <div class="continer bg-white p-6 mt-6 rounded-md flex gap-6 min-h-screen">
      <!-- Sidebar -->
      <div class="left-container">
        <div class="choice-brand1">
          <h1 class="font-bold text-xl">Swags</h1>
          <ul class="list-none list-inside pl-6 text-gray-400 p-2 w-full">
            <li class="p-2 hover:underline">Shirts</li>
            <li class="p-2 hover:underline">Hoodies</li>
            <li class="p-2 hover:underline">Jackets</li>
            <li class="p-2 hover:underline">Accessories</li>
          </ul>
        </div>

        <div class="choice-brand1">
          <h1 class="font-bold text-xl">Natural</h1>
          <ul class="list-none list-inside pl-6 text-gray-400 p-2 w-full">
            <li class="p-2 hover:underline">Shirts</li>
            <li class="p-2 hover:underline">Hoodies</li>
            <li class="p-2 hover:underline">Jackets</li>
            <li class="p-2 hover:underline">Accessories</li>
          </ul>
        </div>

        <div class="choice-brand1">
          <h1 class="font-bold text-xl">Synthetic</h1>
          <ul class="list-none list-inside pl-6 text-gray-400 p-2 w-full">
            <li class="p-2 hover:underline">Shirts</li>
            <li class="p-2 hover:underline">Hoodies</li>
            <li class="p-2 hover:underline">Jackets</li>
            <li class="p-2 hover:underline">Accessories</li>
          </ul>
        </div>

        <div class="choice-brand1">
          <h1 class="font-bold text-xl">Structures</h1>
          <ul class="list-none list-inside pl-6 text-gray-400 p-2 w-full">
            <li class="p-2 hover:underline">Shirts</li>
            <li class="p-2 hover:underline">Hoodies</li>
            <li class="p-2 hover:underline">Jackets</li>
            <li class="p-2 hover:underline">Accessories</li>
          </ul>
        </div>
      </div>

      <!-- Card Grid -->
      <div
        id="cardContainer"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 p-6 flex-1"
      ></div>
    </div>

    <!-- Script -->
    <script>
      // Default data for the first 3 cards
      const cardData = [
        {
          title: "Card Title",
          text: "T-Shirt News",
          desc: "This is a description of the card content.",
          image: "https://images.unsplash.com/photo-1501004318641-b39e6451bec6",
          url: "#",
        },
        {
          title: "Card Title",
          text: "Latest Updates",
          desc: "A brief description for the second card.",
          image: "https://images.unsplash.com/photo-1504198453319-5ce911bafcde",
          url: "#",
        },
        {
          title: "Card Title",
          text: "More Info",
          desc: "Another card with different content goes here.",
          image: "https://images.unsplash.com/photo-1491553895911-0055eca6402d",
          url: "#",
        },
      ];

      const container = document.getElementById("cardContainer");

      // Render initial cards
      cardData.forEach((item) => {
        const card = document.createElement("div");
        card.className =
          "bg-white shadow-md rounded-xl overflow-hidden border border-gray-100";

        card.innerHTML = `
          <img src="${item.image}" class="w-full h-48 object-cover" />
          <div class="p-5">
            <h2 class="text-xl font-semibold">${item.title}</h2>
            <p class="text-gray-500">${item.text}</p>
            <p class="mt-2 text-gray-600">${item.desc}</p>
            <a href="${item.url}"
              class="mt-4 inline-block bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
              Learn More
            </a>
          </div>
        `;
        container.appendChild(card);
      });

      // ⭐ FUNCTION YOU CALL FROM THE CONSOLE ⭐
      window.addCardsFromConsole = function (count) {
        for (let i = 0; i < count; i++) {
          const card = document.createElement("div");
          card.className =
            "bg-white shadow-md rounded-xl overflow-hidden border border-gray-100";

          const img = `https://source.unsplash.com/random/400x300?sig=${
            Date.now() + i
          }`;

          card.innerHTML = `
            <img src="${img}" class="w-full h-48 object-cover" />
            <div class="p-5">
              <h2 class="text-xl font-semibold">Card ${i + 1}</h2>
              <p class="text-gray-500">Generated from console</p>
              <p class="mt-2 text-gray-600">
                This card was created automatically using JavaScript.
              </p>
              <a href="#"
                class="mt-4 inline-block bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                Learn More
              </a>
            </div>
          `;

          container.appendChild(card);
        }
      };
    </script>
  </body>
</html>
