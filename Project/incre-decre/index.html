<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Number Game</title>
    <style>
      :root {
        --bg: #ffffff;
        --card: #f5f1e6; /* beige */
        --text: #222;
        --primary: #2563eb; /* blue */
        --danger: #dc2626; /* red */
        --radius: 14px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background-color: var(--bg);
        min-height: 100dvh;
        display: grid;
        place-items: center;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          Helvetica,
          sans-serif;
        color: var(--text);
      }

      .card {
        width: min(340px, 92vw);
        background: var(--card);
        border-radius: var(--radius);
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.06),
          0 8px 24px rgba(0, 0, 0, 0.08);
      }

      .title {
        margin: 0;
        font-size: 14px;
        letter-spacing: 0.04em;
        opacity: 0.7;
        text-transform: uppercase;
      }

      .number {
        margin: 0;
        font-size: 56px;
        font-weight: 800;
        line-height: 1;
        text-align: center;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      button {
        padding: 12px 14px;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 120ms ease,
          box-shadow 120ms ease,
          background 120ms ease;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      button:active {
        transform: translateY(1px);
      }

      .btn-decrease {
        background: #fee2e2; /* light red */
        color: var(--danger);
      }
      .btn-decrease:hover {
        background: #fecaca;
      }

      .btn-increase {
        background: #dbeafe; /* light blue */
        color: var(--primary);
      }
      .btn-increase:hover {
        background: #bfdbfe;
      }

      .row {
        display: flex;
        gap: 10px;
        justify-content: space-between;
        align-items: center;
      }

      .btn-reset {
        width: 100%;
        background: #e5e7eb; /* gray */
        color: #111827;
      }
      .btn-reset:hover {
        background: #d1d5db;
      }

      .hint {
        font-size: 12px;
        opacity: 0.6;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="card" role="region" aria-label="Number Game">
      <p class="title">Current value</p>
      <h2 id="spawn-number" class="number" aria-live="polite">0</h2>

      <div class="controls">
        <button id="decrease" class="btn-decrease" type="button">
          Decrease
        </button>
        <button id="increase" class="btn-increase" type="button">
          Increase
        </button>
      </div>

      <div class="row">
        <button id="reset" class="btn-reset" type="button">Reset</button>
      </div>

      <p class="hint">
        Tips: Use ↑ to increase, ↓ to decrease, and 0 to reset.
      </p>
    </main>

    <script>
      // ----- State -----
      let num = 0;
      const min = -999; // change/remove bounds as you like
      const max = 999;

      // ----- Elements -----
      const numberEl = document.getElementById("spawn-number");
      const btnDec = document.getElementById("decrease");
      const btnInc = document.getElementById("increase");
      const btnReset = document.getElementById("reset");

      // ----- Helpers -----
      function render() {
        numberEl.textContent = String(num);
      }

      function clamp(value) {
        return Math.min(max, Math.max(min, value));
      }

      function update(delta) {
        num = clamp(num + delta);
        render();
        // Optional: visual feedback
        numberEl.animate(
          [
            { transform: "scale(1.0)" },
            { transform: "scale(1.06)" },
            { transform: "scale(1.0)" },
          ],
          {
            duration: 140,
            easing: "ease-out",
          },
        );
        console.log(`Value: ${num}`);
      }

      function reset() {
        num = 0;
        render();
      }

      // ----- Events -----
      btnDec.addEventListener("click", () => update(-1));
      btnInc.addEventListener("click", () => update(1));
      btnReset.addEventListener("click", reset);

      // Keyboard: ArrowDown = -1, ArrowUp = +1, 0 = reset
      window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowDown") update(-1);
        else if (e.key === "ArrowUp") update(1);
        else if (e.key === "0") reset();
      });

      // Initial paint
      render();
    </script>
  </body>
</html>
