<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body>
    <div class="flex items-center justify-center h-screen">
      <div class="w-[320px] bg-slate-400 rounded-md shadow-md p-4">
        <!-- Display -->
        <div
          class="border border-black bg-white rounded-sm h-16 flex items-center px-4"
        >
          <h1 id="displayValue" class="text-2xl font-bold"></h1>
        </div>

        <!-- Buttons Grid -->
        <div class="grid grid-cols-4 gap-3 mt-4">
          <!-- Row 1 -->
          <button class="btn" data-value="%">%</button>
          <button class="btn" data-value="1/x">1/x</button>
          <button class="btn" data-value="7">7</button>
          <button class="btn" data-value="4">4</button>

          <!-- Row 2 -->
          <button class="btn" data-value="2">2</button>
          <button class="btn" data-value="+/-">+/-</button>
          <button class="btn" data-value="CE">CE</button>
          <button class="btn" data-value="x2">x²</button>

          <!-- Row 3 -->
          <button class="btn" data-value="8">8</button>
          <button class="btn" data-value="5">5</button>
          <button class="btn" data-value="2">2</button>
          <button class="btn" data-value="0">0</button>

          <!-- Row 4 -->
          <button class="btn" data-value="C">C</button>
          <button class="btn" data-value="sqrt">√</button>
          <button class="btn" data-value="9">9</button>
          <button class="btn" data-value="6">6</button>

          <!-- Row 5 -->
          <button class="btn" data-value="3">3</button>
          <button class="btn" data-value=".">.</button>
          <button class="btn" data-value="Del">Del</button>
          <button class="btn" data-value="/">/</button>

          <!-- Row 6 -->
          <button class="btn" data-value="*">*</button>
          <button class="btn" data-value="-">-</button>
          <button class="btn" data-value="+">+</button>
          <button class="btn bg-orange-400 text-white" data-value="=">=</button>
        </div>
      </div>
    </div>

    <!-- JS Logic -->
    <script>
      const display = document.getElementById("displayValue");
      //       let current = "";
      //       querySelectorAll() គឺជា function របស់ JavaScript ដែលប្រើ
      // 👉 ជ្រើស (select) element ច្រើនៗ ក្នុង HTML ដោយប្រើ CSS selector។
      // វាត្រឡប់ជា NodeList (ស្រដៀង Array) ដែលមាន element ច្រើន។
      document.querySelectorAll(".btn").forEach((btn) => {
        //to Show the UI when we click on the button e.g when click the button its show h2 hello
        btn.addEventListener("click", () => { 
          let value = btn.dataset.value;
          if (value === "C") {
            current = "";
          } else if (value === "Del") {
            current = current.slice(0, -1);
          } else if (value === "=") {
            try {
              //eval calculate a String value like ("1+1") = 2. Then toString convert the value to String back for show the value on screen
              current = eval(current).toString();
            } catch {
              current = "Error";
            }
          } else if (value === "+/-") {
            // We used paraseFloat to convert String to decimal number or numbe
            current = (parseFloat(current) * -1).toString();
          } else if (value === "x2") {
            current = (parseFloat(current) ** 2).toString();
          } else if (value === "sqrt") {
            current = Math.sqrt(parseFloat(current)).toString();
          } else {
            current += value;
          }

          display.innerText = current;
        });
      });
    </script>
  </body>
</html>
