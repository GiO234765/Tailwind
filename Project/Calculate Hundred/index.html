<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple Calculator</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    .btn {
      padding: 10px;
      background: #f3f4f6;
      border-radius: 6px;
      font-weight: bold;
      transition: 0.2s;
    }
    .btn:hover {
      background: #d1d5db;
    }
  </style>
</head>

<body class="flex items-center justify-center h-screen bg-gray-100">

  <div class="bg-white p-4 rounded-lg shadow-md w-64">

    <!-- Display -->
    <div class="border border-black rounded h-16 flex items-center justify-end px-4 mb-3">
      <h1 id="displayValue" class="text-2xl font-bold">0</h1>
    </div>

    <!-- Buttons -->
    <div class="grid grid-cols-4 gap-3">

      <button class="btn" data-value="%">%</button>
      <button class="btn" data-value="1/x">1/x</button>
      <button class="btn" data-value="x2">x²</button>
      <button class="btn" data-value="sqrt">√</button>

      <button class="btn" data-value="7">7</button>
      <button class="btn" data-value="8">8</button>
      <button class="btn" data-value="9">9</button>
      <button class="btn" data-value="/">/</button>

      <button class="btn" data-value="4">4</button>
      <button class="btn" data-value="5">5</button>
      <button class="btn" data-value="6">6</button>
      <button class="btn" data-value="*">*</button>

      <button class="btn" data-value="1">1</button>
      <button class="btn" data-value="2">2</button>
      <button class="btn" data-value="3">3</button>
      <button class="btn" data-value="-">-</button>

      <button class="btn" data-value="0">0</button>
      <button class="btn" data-value=".">.</button>
      <button class="btn" data-value="+/-">+/-</button>
      <button class="btn" data-value="+">+</button>

      <button class="btn" data-value="C">C</button>
      <button class="btn" data-value="Del">Del</button>
      <button class="btn col-span-2 bg-orange-500 text-white" data-value="=">=</button>

    </div>
  </div>

  <!-- JavaScript -->
  <script>
    const display = document.getElementById("displayValue");
    let current = "";

    function updateDisplay() {
      display.innerText = current || "0";
    }

    document.querySelectorAll(".btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const value = btn.dataset.value;
        if (value === "C") {
          current = "";
        } 
        else if (value === "Del") {
          current = current.slice(0, -1);
        } 
        else if (value === "=") {
          try {
            current = eval(current).toString();
          } catch {
            current = "Error";
          }
        } 
        else if (value === "+/-") {
          if (current) current = (parseFloat(current) * -1).toString();
        } 
        else if (value === "x2") {
          if (current) current = (parseFloat(current) ** 2).toString();
        } 
        else if (value === "sqrt") {
          if (current) current = Math.sqrt(parseFloat(current)).toString();
        } 
        else if (value === "1/x") {
          if (current && parseFloat(current) !== 0) {
            current = (1 / parseFloat(current)).toString();
          }
        } 
        else {
          current += value;
        }

        updateDisplay();
      });
    }); 
    updateDisplay();
  </script>
</body>
</html>
