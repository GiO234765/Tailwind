<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="container h-screen w-full flex justify-center items-center">
      <div class="login-form w-50 border-none shadow-lg">
        <form action="" class="w-20 ">
          <span class="border-1 border-gray-300 bg-slate-200 p-2">Your email</span>
          <input type="text" class="" />
          <span class="">Password</span>
          <input type="text" class="border-1 border-gray-300 bg-slate-200 p-2" />
          <div class="rem-container">
            <div class="">Remember me</div>
            <div class="">Forget password?</div>
          </div>
          <button class="">Login in to your account</button>
          <div class="">Don't have an account?</div>
        </form>
      </div>
    </div>
  </body>
</html>
